<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Admin Panel — AWI.TO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

const fdb=firebase.firestore();

<style>
:root { --bg: #0e0f11; --card: #1c1e24; --accent: #0084ff; --text: #ccc; }
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;padding:20px;margin:0}
.header{text-align:center;margin-bottom:30px}
.header h1{color:#fff;margin:0;font-size:24px}
.header p{color:var(--accent);margin:5px 0 0;font-weight:600}
.wrap{max-width:800px;margin:0 auto}
.box{background:var(--card);padding:20px;border-radius:12px;margin-bottom:25px;border:1px solid #2a2d35;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.box h2{color:#fff;margin-top:0;margin-bottom:15px;font-size:18px;border-bottom:1px dashed #333;padding-bottom:10px;display:flex;align-items:center;gap:10px}
input, select, textarea {width:100%;padding:12px;background:#0e0f11;border:1px solid #333;color:#fff;border-radius:8px;margin-bottom:12px;outline:none;font-family:'Poppins',sans-serif;box-sizing:border-box}
input:focus, select:focus, textarea:focus{border-color:var(--accent)}
button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;transition:0.3s}
button:hover{background:#006bce}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.jikan-btn{background:#ff4656;margin-bottom:15px}
.jikan-btn:hover{background:#d83442}
.bulk-btn{background:#00c6ff;color:#000}
.bulk-btn:hover{background:#00a3d4}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:30px;font-weight:600;display:none;z-index:1000;box-shadow:0 5px 15px rgba(0,0,0,.3)}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>AWI.TO MASTER PANEL</h1>
    <p>Manage Anime & Episodes</p>
  </div>

  <div class="box">
    <h2>🔍 AUTO-FETCH & ADD ANIME</h2>
    <div class="grid-2">
      <input id="jikanSearch" placeholder="Type Anime Name (e.g. Naruto)">
      <button class="jikan-btn" onclick="fetchJikan()">AUTO FILL DETAILS</button>
    </div>
    <input id="aName" placeholder="Anime Name">
    <input id="aPoster" placeholder="Poster Image URL (from i.ibb.co or auto-fetched)">
    <input id="aGenre" placeholder="Genres (e.g. Action, Shonen)">
    <textarea id="aDesc" rows="3" placeholder="Synopsis/Description"></textarea>
    <button onclick="addAnime()">➕ PUBLISH ANIME</button>
  </div>

  <div class="box">
    <h2>🎬 ADD SINGLE EPISODE</h2>
    <select id="selAnime1"><option value="">-- Select Anime --</option></select>
    <div class="grid-2">
      <input id="epNum" type="number" placeholder="Episode Number (e.g. 1)">
      <input id="epTitle" placeholder="Ep Title (Optional)">
    </div>
    <input id="epPlayer" placeholder="[Quick Watch] Link (Bysekoze Player URL)">
    <input id="epDownload" placeholder="[Download] Link (IndianShortener URL)">
    <button onclick="addSingleEp()">➕ ADD EPISODE</button>
  </div>

  <div class="box">
    <h2>📋 QUICK BULK ADD</h2>
    <p style="font-size:12px;color:#888;margin-top:-10px;margin-bottom:15px">Paste multiple links. It will automatically assign them to both [Quick Watch] and [Download] buttons.</p>
    <select id="selAnime2"><option value="">-- Select Anime --</option></select>
    <input id="bulkStart" type="number" placeholder="Starting Episode Number (e.g. 1)">
    <textarea id="bulkLinks" rows="6" placeholder="Paste all shortened links here (One link per line)"></textarea>
    <button class="bulk-btn" onclick="addBulkEps()">🚀 UPLOAD BULK EPISODES</button>
  </div>
</div>

<div id="toast">Message</div>

<script>
let animeList = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Load Anime List for Dropdowns
async function loadAnime() {
  const snap = await fdb.collection('anime').orderBy('createdAt','desc').get();
  animeList = snap.docs.map(d => ({id: d.id, ...d.data()}));
  const opts = '<option value="">-- Select Anime --</option>' + animeList.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  document.getElementById('selAnime1').innerHTML = opts;
  document.getElementById('selAnime2').innerHTML = opts;
}

// Jikan API Auto-Fetch
async function fetchJikan() {
  const q = document.getElementById('jikanSearch').value.trim();
  if(!q) return showToast('❌ Type anime name first!');
  showToast('⏳ Fetching from Jikan...');
  try {
    const res = await fetch('https://api.jikan.moe/v4/anime?q=' + encodeURIComponent(q) + '&limit=1');
    const data = await res.json();
    if(data.data && data.data.length > 0) {
      const anime = data.data[0];
      document.getElementById('aName').value = anime.title_english || anime.title;
      document.getElementById('aPoster').value = anime.images.jpg.large_image_url;
      document.getElementById('aDesc').value = anime.synopsis;
      const genres = anime.genres.map(g => g.name).join(', ');
      document.getElementById('aGenre').value = genres;
      showToast('✅ Details Auto-Filled!');
    } else { showToast('❌ Anime not found'); }
  } catch(e) { showToast('❌ API Error!'); }
}

// Add New Anime
async function addAnime() {
  const name = document.getElementById('aName').value.trim();
  const poster = document.getElementById('aPoster').value.trim();
  const desc = document.getElementById('aDesc').value.trim();
  const genre = document.getElementById('aGenre').value.trim();
  
  if(!name) return showToast('❌ Anime name is required!');
  
  await fdb.collection('anime').add({
    name, poster, description: desc, genre, createdAt: new Date().toISOString()
  });
  
  showToast('✅ Anime Published!');
  document.getElementById('aName').value = '';
  document.getElementById('aPoster').value = '';
  document.getElementById('aDesc').value = '';
  document.getElementById('aGenre').value = '';
  loadAnime();
}

// Add Single Episode
async function addSingleEp() {
  const aid = document.getElementById('selAnime1').value;
  const num = parseInt(document.getElementById('epNum').value);
  const title = document.getElementById('epTitle').value || ('Episode ' + num);
  const player = document.getElementById('epPlayer').value.trim();
  const download = document.getElementById('epDownload').value.trim();
  
  if(!aid || !num) return showToast('❌ Select Anime & enter Ep Number!');
  
  await fdb.collection('episodes').add({
    animeId: aid, num: num, title: title,
    links: { "HD": { player: player, short: download } },
    addedAt: new Date().toISOString()
  });
  
  showToast('✅ Episode Added!');
  document.getElementById('epNum').value = num + 1; // Auto-increment for next
  document.getElementById('epTitle').value = '';
  document.getElementById('epPlayer').value = '';
  document.getElementById('epDownload').value = '';
}

// Add Bulk Episodes
async function addBulkEps() {
  const aid = document.getElementById('selAnime2').value;
  const startNum = parseInt(document.getElementById('bulkStart').value) || 1;
  const rawLinks = document.getElementById('bulkLinks').value.trim();
  
  if(!aid) return showToast('❌ Select Anime!');
  if(!rawLinks) return showToast('❌ Paste links first!');
  
  const links = rawLinks.split('\n').map(l => l.trim()).filter(l => l.length > 5);
  showToast(`⏳ Adding ${links.length} episodes...`);
  
  const batch = fdb.batch();
  links.forEach((link, idx) => {
    const num = startNum + idx;
    const epRef = fdb.collection('episodes').doc();
    batch.set(epRef, {
      animeId: aid, num: num, title: 'Episode ' + num,
      links: { "HD": { player: link, short: link } }, // Puts the same link for both Quick Watch & Download
      addedAt: new Date().toISOString()
    });
  });
  
  try {
    await batch.commit();
    showToast('✅ Bulk Upload Complete!');
    document.getElementById('bulkLinks').value = '';
  } catch(e) { showToast('❌ Bulk Upload Failed!'); }
}

loadAnime();
</script>
</body>
</html>
