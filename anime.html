<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Details — AWI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Teko:wght@600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({ apiKey:"AIzaSyDfNgqR9UtKUvd2Prf2YPBFu33DJ_ubytk", authDomain:"anime-website-42907.firebaseapp.com", projectId:"anime-website-42907", storageBucket:"anime-website-42907.firebasestorage.app", messagingSenderId:"747833174910", appId:"1:747833174910:web:eefcbf01901ecb58b8a12f" });
const fdb=firebase.firestore();
</script>

<style>
:root { --bg: #0e0f11; --card: #202329; --nav: #14151a; --accent: #ffdd95; --text: #cacaca; --border: #2c2f36; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

.navbar{background:var(--nav);padding:0 14px;display:flex;align-items:center;gap:12px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.back{background:#2b2d36;color:#fff;width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;transition:all .2s}
.back:hover{background:var(--accent);color:#111}
.nb-title{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:1px}

.wrap{max-width:800px;margin:0 auto;padding:20px 14px 40px}
.poster-wrap{width:100%;border-radius:12px;overflow:hidden;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.5);position:relative}
.poster-wrap img{width:100%;max-height:400px;object-fit:cover;object-position:top;display:block}

.anime-title{font-family:'Teko',sans-serif;font-size:32px;font-weight:700;line-height:1.1;margin-bottom:12px;color:#fff;letter-spacing:1px}

.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tag{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;color:#111;background:var(--accent)}
.t-gn{background:#2b2d36;color:#fff}

.info-box, .syn-box, .ep-section{background:var(--card);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border)}
.ir{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px}
.ir:last-child{border-bottom:none}
.il{color:#888;min-width:100px;flex-shrink:0}
.iv{color:#fff;font-weight:500;flex:1}

.syn-box h3, .ep-section h2{font-family:'Teko',sans-serif;font-size:22px;color:var(--accent);margin-bottom:10px;letter-spacing:1px;border-bottom:1px solid var(--border);padding-bottom:8px}
.syn-txt{font-size:13px;line-height:1.8;color:#bbb}

/* ACCESS BOX */
.access-box{background:linear-gradient(135deg, #2b2d36, #1a1c22);border:1px solid var(--accent);border-radius:12px;padding:24px 16px;text-align:center;margin-bottom:24px}
.access-box h3{font-family:'Teko',sans-serif;font-size:26px;color:var(--accent);margin-bottom:8px}
.unlock-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:30px;background:var(--accent);color:#111;font-weight:700;text-decoration:none;transition:transform .2s;margin-top:10px}
.unlock-btn:hover{transform:scale(1.05)}

.unlocked-banner{background:rgba(255,221,149,0.1);border:1px solid var(--accent);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;color:#fff;margin-bottom:24px}
.ub-timer{margin-left:auto;text-align:right;color:var(--accent);font-family:'Teko',sans-serif;font-size:24px;font-weight:700}

/* EPISODES */
.ep-row{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;transition:background .2s;border-radius:8px}
.ep-row:hover{background:#2a2d36}
.ep-title{font-size:14px;font-weight:600;color:#fff}
.ep-links{display:flex;flex-wrap:wrap;gap:8px}
.dl-link{background:#111;color:var(--accent);border:1px solid var(--accent);padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;text-decoration:none;transition:all .2s}
.dl-link:hover{background:var(--accent);color:#111}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="back">←</a>
  <span class="nb-title" id="nbTitle">Loading...</span>
</nav>

<div id="pageContent"><div class="wrap"><div class="loading-screen" style="color:#fff;text-align:center;padding:50px">Loading...</div></div></div>

<script>
const ACCESS_KEY = 'awi24hr_v2';
function isUnlocked() { const a = JSON.parse(localStorage.getItem(ACCESS_KEY)||'null'); return a && Date.now() < a.expiry; }
function getTimeLeft() { const a = JSON.parse(localStorage.getItem(ACCESS_KEY)||'null'); if (!a || Date.now() >= a.expiry) return null; const ms = a.expiry - Date.now(); return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m'; }

let globalSettings = {};
async function loadSettings() { try { const doc = await fdb.collection('settings').doc('unlock').get(); if(doc.exists) globalSettings = doc.data(); } catch(e){} }

function buildContinueUrl(animeId) {
  const token = btoa(animeId + '_' + Math.floor(Date.now() / 86400000)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 12);
  let url = `continue.html?token=${token}&aid=${animeId}&ret=${encodeURIComponent(window.location.href)}`;
  if(globalSettings.link1) url += `&l1=${encodeURIComponent(globalSettings.link1)}`;
  if(globalSettings.link2) url += `&l2=${encodeURIComponent(globalSettings.link2)}`;
  return url;
}

function renderPage(a) {
  const unlocked = isUnlocked();
  const eps = (a.episodes||[]).sort((x,y)=>x.num-y.num);
  document.getElementById('nbTitle').textContent = a.name;

  const accessHtml = unlocked 
    ? `<div class="unlocked-banner"><div>🔓 <b>UNLOCKED</b><br><small style="color:#aaa">Unlimited Downloads</small></div><div class="ub-timer">${getTimeLeft()}</div></div>`
    : `<div class="access-box"><h3>🔐 UNLOCK ACCESS</h3><p style="color:#aaa;font-size:13px;margin-bottom:10px">1 Click = 24 Hours Unlimited Access</p><a href="${buildContinueUrl(a.id)}" class="unlock-btn">Unlock Now</a></div>`;

  const epHtml = eps.map(ep => {
    const qLinks = Object.entries(ep.links||{}).filter(([q,l])=>l).map(([q,l]) => {
      const href = unlocked ? (l.direct||l.short||'') : (l.short||l.direct||'');
      return href ? `<a href="${href}" target="_blank" class="dl-link">${q}</a>` : '';
    }).join('');
    return qLinks ? `<div class="ep-row"><div class="ep-title">EP ${ep.num} - ${ep.title}</div><div class="ep-links">${qLinks}</div></div>` : '';
  }).join('');

  document.getElementById('pageContent').innerHTML = `<div class="wrap">
    ${a.poster ? `<div class="poster-wrap"><img src="${a.poster.replace('ibb.co','i.ibb.co')}"></div>` : ''}
    <div class="anime-title">${a.name}</div>
    <div class="tags"><span class="tag">HD DUB</span>${(a.genre||'').split(',').map(g=>`<span class="tag t-gn">${g.trim()}</span>`).join('')}</div>
    <div class="info-box">
      <div class="ir"><span class="il">Status</span><span class="iv">${a.status||'N/A'}</span></div>
      <div class="ir"><span class="il">Episodes</span><span class="iv">${eps.length}</span></div>
      <div class="ir"><span class="il">Quality</span><span class="iv">${a.quality||'1080p'}</span></div>
    </div>
    ${a.description ? `<div class="syn-box"><h3>SYNOPSIS</h3><div class="syn-txt">${a.description}</div></div>` : ''}
    ${accessHtml}
    <div class="ep-section"><h2>EPISODES</h2>${epHtml||'<p style="color:#888;font-size:13px">No episodes yet.</p>'}</div>
  </div>`;
}

async function init(){
  const aid = new URLSearchParams(window.location.search).get('id');
  if(!aid) return;
  await loadSettings();
  fdb.collection('anime').doc(aid).onSnapshot(doc => {
    if(doc.exists) {
      const a = {id: doc.id, ...doc.data()};
      fdb.collection('episodes').where('animeId','==',aid).onSnapshot(snap => {
        a.episodes = snap.docs.map(d=>d.data());
        renderPage(a);
      });
    }
  });
}
init();
</script>
</body>
</html>
