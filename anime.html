<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#222;font-family:'Hind',sans-serif;min-height:100vh}

/* AD */
.ad-top{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 10px;display:flex;align-items:center;justify-content:center;min-height:60px}
.ad-ph{width:100%;max-width:728px;min-height:50px;background:#f9f9f9;border:1px dashed #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa}

/* NAVBAR */
.navbar{background:#fff;border-bottom:2px solid #e0e0e0;padding:0 14px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.back{background:#1565c0;border:none;color:#fff;width:34px;height:34px;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.nb-title{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-s{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;text-decoration:none;flex-shrink:0}
.lr{color:#c00}.lt{color:#333}.li{color:#e67e00}

/* MAIN CONTENT */
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 30px}

/* POSTER */
.poster-wrap{width:100%;border-radius:10px;overflow:hidden;margin-bottom:16px;background:#eee;position:relative}
.poster-wrap img{width:100%;display:block;border-radius:10px}

/* TITLE */
.anime-title{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;line-height:1.1;margin-bottom:8px;color:#222}

/* TAGS */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.3px}
.t-hi{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.t-hd{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.t-gn{background:#f3e5f5;color:#6a1b9a;border:1px solid #ce93d8}
.t-st{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}

/* INFO TABLE */
.info-box{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.info-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:flex-start}
.info-row:last-child{border-bottom:none}
.info-label{color:#888;min-width:90px;flex-shrink:0}
.info-val{color:#222;font-weight:500;flex:1}
.info-val.green{color:#2e7d32}

/* SYNOPSIS */
.syn-box{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.syn-box h3{font-family:'Teko',sans-serif;font-size:16px;color:#1565c0;margin-bottom:7px;letter-spacing:.5px}
.syn-txt{font-size:13px;color:#555;line-height:1.7;max-height:72px;overflow:hidden;transition:max-height .3s ease}
.syn-txt.exp{max-height:500px}
.rm-btn{background:none;border:none;color:#1565c0;font-size:12px;font-weight:600;cursor:pointer;padding:4px 0;display:block}

/* AD MID */
.ad-mid{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center;margin-bottom:14px;min-height:100px;display:flex;align-items:center;justify-content:center}

/* ACCESS BOX */
.access-box{background:#fff;border:2px solid #1565c0;border-radius:10px;padding:14px;margin-bottom:16px;text-align:center}
.access-box h3{font-family:'Teko',sans-serif;font-size:18px;color:#1565c0;margin-bottom:5px;letter-spacing:.5px}
.access-box p{font-size:12px;color:#555;margin-bottom:12px;line-height:1.6}
.ulinks{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.ulink{display:flex;align-items:center;gap:10px;background:#f5f5f5;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px 14px;text-decoration:none;color:#222;transition:all .15s}
.ulink:hover,.ulink.done{border-color:#1565c0;background:#e3f2fd}
.ulink.done{border-color:#2e7d32;background:#e8f5e9}
.ul-icon{font-size:18px;flex-shrink:0}
.ul-text h4{font-size:13px;font-weight:600}
.ul-text span{font-size:11px;color:#888}
.ul-st{font-size:12px;font-weight:700;margin-left:auto;flex-shrink:0;color:#1565c0}
.ulink.done .ul-st{color:#2e7d32}
.access-note{font-size:11px;color:#aaa;padding:6px;background:#f9f9f9;border-radius:6px}

/* UNLOCKED BANNER */
.unlocked{background:#1b5e20;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#fff}
.ub-info h3{font-family:'Teko',sans-serif;font-size:17px;font-weight:700}
.ub-info p{font-size:11px;opacity:.85}
.ub-timer{margin-left:auto;text-align:right;flex-shrink:0}
.ub-timer span{font-family:'Teko',sans-serif;font-size:20px;color:#a5d6a7;display:block}
.ub-timer small{font-size:10px;opacity:.8}

/* EPISODE SECTION — RareToonIndia style */
.ep-section{margin-bottom:16px}
.ep-section h2{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:#1565c0;border-left:4px solid #1565c0;padding-left:10px;margin-bottom:12px;letter-spacing:.5px}

/* EPISODE ROW */
.ep-row{padding:12px 0;border-bottom:1px solid #f0f0f0}
.ep-row:last-child{border-bottom:none}
.ep-num-title{font-size:15px;font-weight:600;color:#222;margin-bottom:6px}
.ep-links{display:flex;flex-wrap:wrap;align-items:center;gap:4px;font-size:13px}
.lang-label{color:#2e7d32;font-weight:700}
.ep-dash{color:#555}
.dl-link{color:#1565c0;font-weight:700;text-decoration:none}
.dl-link:hover{text-decoration:underline}
.locked-row{color:#aaa;font-size:12px;margin-top:4px}

/* ZIP / SEASON PACK */
.zip-section{margin-bottom:16px}
.zip-section h2{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;color:#2e7d32;border-left:4px solid #2e7d32;padding-left:10px;margin-bottom:12px;letter-spacing:.5px;text-align:center}
.zip-title{font-family:'Teko',sans-serif;font-size:16px;color:#6a1b9a;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:.3px}
.zip-sub{font-size:12px;color:#888;text-align:center;margin-bottom:8px}
.zip-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.zip-link{color:#1565c0;font-weight:700;text-decoration:none;font-size:14px;padding:4px 8px;background:#e3f2fd;border-radius:5px}
.zip-divider{border:none;border-top:1px solid #e0e0e0;margin:10px 0}

/* BOTTOM NAV */
.pad-bot{height:68px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:grid;grid-template-columns:repeat(3,1fr);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.07)}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;text-decoration:none;color:#888;font-size:10px;font-weight:600;gap:2px}
.bn-item:hover{color:#1565c0}.bn-icon{font-size:20px}

/* LOADING */
.loading-screen{text-align:center;padding:80px 20px;color:#aaa}
.loading-screen div{font-size:40px;margin-bottom:12px}
</style>

<script>
// ============================================================
// ACCESS SYSTEM — Anti-bypass blocking modal
// ============================================================
const ACCESS_KEY='awi24hr';
const CLICK_KEY='awiClicks';
const WAIT_SECS=18;

function isUnlocked(){
  const d=localStorage.getItem(ACCESS_KEY);
  return d&&Date.now()<parseInt(d);
}
function getTimeLeft(){
  const d=localStorage.getItem(ACCESS_KEY);
  if(!d)return null;
  const ms=parseInt(d)-Date.now();
  if(ms<=0)return null;
  return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';
}
function getClicks(){return JSON.parse(localStorage.getItem(CLICK_KEY)||'{}');}

// Show blocking overlay — user CANNOT dismiss early
function showCountdown(animeId, linkNum, url){
  // Open link in new tab
  window.open(url,'_blank');

  // Create full-screen blocking overlay
  const overlay=document.createElement('div');
  overlay.id='cdOverlay';
  overlay.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center`;
  overlay.innerHTML=`
    <div style="font-size:50px;margin-bottom:16px">⏳</div>
    <h2 style="font-family:'Teko',sans-serif;font-size:26px;color:#fff;letter-spacing:1px;margin-bottom:8px">PLEASE WAIT</h2>
    <p style="color:#aaa;font-size:13px;margin-bottom:24px;line-height:1.6">Ad is loading in the other tab.<br>Please wait for the timer to complete.</p>
    <div style="width:90px;height:90px;border-radius:50%;background:#1565c0;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
      <span id="cdNum" style="font-family:'Teko',sans-serif;font-size:44px;color:#fff;font-weight:700">${WAIT_SECS}</span>
    </div>
    <p style="color:#666;font-size:11px">Do not close this page</p>`;
  document.body.appendChild(overlay);
  document.body.style.overflow='hidden';

  let remaining=WAIT_SECS;
  const ticker=setInterval(()=>{
    remaining--;
    const el=document.getElementById('cdNum');
    if(el)el.textContent=remaining;
    if(remaining<=0){
      clearInterval(ticker);
      // Count the click
      const c=getClicks();
      const k=animeId+'_'+linkNum;
      c[k]=Date.now();
      localStorage.setItem(CLICK_KEY,JSON.stringify(c));

      // Check if unlocked
      const a=currentAnime;
      const hasTwo=a&&a.unlockLink1&&a.unlockLink2;
      const done=hasTwo?(c[animeId+'_1']&&c[animeId+'_2']):c[animeId+'_1'];

      document.body.removeChild(overlay);
      document.body.style.overflow='';

      if(done){
        localStorage.setItem(ACCESS_KEY,Date.now()+24*3600000);
        renderPage(currentAnime);
      } else {
        // Show link 2 as done, update UI
        renderPage(currentAnime);
      }
    }
  },1000);
}

function markClick(animeId,linkNum){
  // Prevent default — handled by showCountdown
  return false;
}

// ============================================================
// RENDER
// ============================================================
let currentAnime=null;

function fixPoster(url){
  if(!url)return '';
  return url.replace('https://ibb.co/','https://i.ibb.co/').replace('http://ibb.co/','https://i.ibb.co/');
}

function renderPage(a){
  currentAnime=a;
  const unlocked=isUnlocked();
  const eps=a.episodes||[];
  const packs=a.seasonPacks||[];
  const clicks=getClicks();
  const poster=fixPoster(a.poster);

  document.getElementById('nbTitle').textContent=a.name+(a.season?' '+a.season:'');
  document.title=a.name+(a.season?' '+a.season:'')+' — AnimeWorld India';

  // Build info rows
  const infoRows=[
    {l:'📺 Name',v:a.name,cls:'green'},
    a.season?{l:'🎬 Season',v:a.season,cls:'green'}:null,
    a.totalEps||eps.length?{l:'📼 Episodes',v:a.totalEps||eps.length,cls:'green'}:null,
    a.year?{l:'🕐 Year',v:a.year,cls:'green'}:null,
    a.runtime?{l:'⌛ Runtime',v:a.runtime,cls:'green'}:null,
    a.genre?{l:'🎭 Genre',v:a.genre,cls:'green'}:null,
    a.language?{l:'🌐 Language',v:a.language,cls:'green'}:null,
    a.quality?{l:'🎥 Quality',v:a.quality,cls:'green'}:null,
    a.status?{l:'📡 Status',v:a.status,cls:'green'}:null,
  ].filter(Boolean);

  // Episode list HTML
  const sortedEps=[...eps].sort((x,y)=>x.num-y.num);
  const epHtml=sortedEps.map(ep=>{
    const links=ep.links||{};
    const hasLinks=Object.values(links).some(l=>l);
    if(!hasLinks)return '';
    
    const qualityLinks=Object.entries(links)
      .filter(([q,l])=>l)
      .map(([q,l],i)=>`<a href="${l}" target="_blank" rel="noopener" class="dl-link">[${q}]</a>`)
      .join(' ');

    if(!unlocked){
      return `<div class="ep-row">
        <div class="ep-num-title">Episode ${String(ep.num).padStart(2,'0')} – ${ep.title||'Episode '+ep.num}</div>
        <div class="locked-row">🔒 Unlock access above to download</div>
      </div>`;
    }

    return `<div class="ep-row">
      <div class="ep-num-title">Episode ${String(ep.num).padStart(2,'0')} – ${ep.title||'Episode '+ep.num}</div>
      <div class="ep-links">
        <span class="lang-label">Hindi</span>
        <span class="ep-dash">–</span>
        ${qualityLinks}
      </div>
    </div>`;
  }).join('');

  // Season packs HTML
  const packHtml=packs.map(sp=>{
    const links=sp.links||{};
    const linkBtns=Object.entries(links).filter(([q,l])=>l)
      .map(([q,l])=>unlocked
        ?`<a href="${l}" target="_blank" class="zip-link">${q}</a>`
        :`<span style="color:#aaa;font-size:12px">🔒 Unlock to download</span>`
      ).join('');
    return `<div>
      <div class="zip-title">📦 ${sp.title||'Full Season Pack'}</div>
      <div class="zip-sub">${sp.episodes?sp.episodes+' Episodes · ':''} ${sp.size||''} · ${sp.quality||''}</div>
      <div class="zip-links">${linkBtns}</div>
      <hr class="zip-divider">
    </div>`;
  }).join('');

  // Access box or unlocked banner
  const accessHtml=unlocked?`
  <div class="unlocked">
    <div style="font-size:28px">🔓</div>
    <div class="ub-info">
      <h3>ACCESS UNLOCKED!</h3>
      <p>Download all episodes freely</p>
    </div>
    <div class="ub-timer">
      <span id="timerTxt">${getTimeLeft()||'—'}</span>
      <small>time left</small>
    </div>
  </div>`:`
  <div class="access-box">
    <h3>🔐 UNLOCK FREE ACCESS</h3>
    <p>Click the link${a.unlockLink2?'s':''} below to unlock <strong>24-hour free access</strong> to all episodes!</p>
    <div class="ulinks">
      <a href="#" class="ulink" id="ulink-1" onclick="showCountdown('${a.id}',1,'${a.unlockLink1||'#'}');return false;">
        <div class="ul-icon">🔗</div>
        <div class="ul-text"><h4>Access Link 1</h4><span>Click and wait a few seconds</span></div>
        <div class="ul-st" id="ul-st-1">${clicks[a.id+'_1']?'✅ Done':'Click ▶'}</div>
      </a>
      ${a.unlockLink2?`<a href="#" class="ulink" id="ulink-2" onclick="showCountdown('${a.id}',2,'${a.unlockLink2}');return false;">
        <div class="ul-icon">🔗</div>
        <div class="ul-text"><h4>Access Link 2</h4><span>Click and wait a few seconds</span></div>
        <div class="ul-st" id="ul-st-2">${clicks[a.id+'_2']?'✅ Done':'Click ▶'}</div>
      </a>`:''}
    </div>
    <div class="access-note">⏱ Click both links → get 24hr free access to all anime · Come back tomorrow!</div>
  </div>`;

  document.getElementById('pageContent').innerHTML=`
  <div class="wrap">
    ${poster?`<div class="poster-wrap"><img src="${poster}" alt="${a.name}" onerror="this.parentElement.style.display='none'"></div>`:''}
    
    <div class="anime-title">${a.name}${a.season?' '+a.season:''} Hindi Dubbed Episodes Download HD</div>
    
    <div class="tags">
      <span class="tag t-hi">🇮🇳 ${a.language||'Hindi Dub'}</span>
      ${a.quality?`<span class="tag t-hd">${a.quality}</span>`:''}
      ${a.genre?a.genre.split(',').map(g=>`<span class="tag t-gn">${g.trim()}</span>`).join(''):''}
      ${a.status?`<span class="tag t-st">${a.status}</span>`:''}
    </div>

    <div class="info-box">
      ${infoRows.map(r=>`<div class="info-row"><span class="info-label">${r.l}</span><span class="info-val ${r.cls||''}">${r.v}</span></div>`).join('')}
    </div>

    ${a.description?`
    <div class="syn-box">
      <h3>📖 SYNOPSIS</h3>
      <div class="syn-txt" id="synTxt">${a.description}</div>
      <button class="rm-btn" onclick="toggleSyn()">▼ Read More</button>
    </div>`:''}

    <div class="ad-mid">
      <div class="ad-ph" style="max-width:336px;width:100%;min-height:90px"><!-- Monetag 300x250 -->Advertisement</div>
    </div>

    ${accessHtml}

    ${packs.length?`
    <div class="zip-section">
      <h2>📦 SEASON ZIP BATCH FILE</h2>
      <p style="font-size:12px;color:#888;text-align:center;margin-bottom:12px">Download All Episodes at Once</p>
      ${packHtml}
    </div>`:''}

    ${eps.length?`
    <div class="ep-section">
      <h2>📺 EPISODES (${eps.length})</h2>
      <div id="epList">${epHtml||'<p style="color:#aaa;font-size:13px;text-align:center;padding:24px">No episodes added yet.<br><span style="font-size:11px">Episodes will appear here once added by admin.</span></p>'}</div>
    </div>`:''}

  </div>`;

  if(unlocked){
    // Update timer every minute
    setInterval(()=>{
      const t=document.getElementById('timerTxt');
      if(t)t.textContent=getTimeLeft()||'Expired';
    },60000);
    // Scroll to episodes
    setTimeout(()=>{
      const el=document.getElementById('epList')||document.querySelector('.ep-section')||document.querySelector('.zip-section');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },300);
  }
  // Mark already-clicked links as done
  if(!unlocked){
    if(clicks[String(a.id)+'_1']){
      const el=document.getElementById('ulink-1');
      if(el){el.classList.add('done');const st=el.querySelector('.ul-st');if(st)st.textContent='✅ Done';}
    }
    if(clicks[String(a.id)+'_2']){
      const el=document.getElementById('ulink-2');
      if(el){el.classList.add('done');const st=el.querySelector('.ul-st');if(st)st.textContent='✅ Done';}
    }
  }
}

function toggleSyn(){
  const d=document.getElementById('synTxt');
  const b=document.querySelector('.rm-btn');
  if(!d)return;
  d.classList.toggle('exp');
  b.textContent=d.classList.contains('exp')?'▲ Read Less':'▼ Read More';
}

// ============================================================
// FIREBASE LOAD
// ============================================================
const params=new URLSearchParams(window.location.search);
const animeId=params.get('id');

async function loadAnime(){
  if(!animeId){
    showNotFound();return;
  }
  try{
    const fdb=firebase.firestore();
    // Try direct doc
    const doc=await fdb.collection('anime').doc(String(animeId)).get();
    if(doc.exists){
      renderPage({id:doc.id,...doc.data()});
      return;
    }
    // Fallback — scan all
    const snap=await fdb.collection('anime').get();
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    const found=all.find(a=>String(a.id)===String(animeId));
    if(found){renderPage(found);}
    else{showNotFound();}
  }catch(e){
    console.error('Firebase error:',e);
    document.getElementById('pageContent').innerHTML=`
    <div class="loading-screen">
      <div>⚠️</div>
      <p>Connection error. Please check internet and <a href="" style="color:#1565c0">try again</a>.</p>
    </div>`;
    document.getElementById('nbTitle').textContent='Error';
  }
}

function showNotFound(){
  document.getElementById('pageContent').innerHTML=`
  <div class="loading-screen">
    <div>🔍</div>
    <h2 style="font-family:'Teko',sans-serif;font-size:22px;color:#888;margin-bottom:8px">ANIME NOT FOUND</h2>
    <a href="index.html" style="color:#1565c0;text-decoration:none;font-weight:600">← Go Back</a>
  </div>`;
  document.getElementById('nbTitle').textContent='Not Found';
}
