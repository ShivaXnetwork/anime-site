<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeWorld India вҖ“ Anime</title>
<!-- MONETAG POP-UNDER:
<script src="//ophoacit.com/1?z=YOUR_ZONE_ID" data-cfasync="false" async></script> -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:#f4f4f4;color:#222;font-family:'Hind',sans-serif;min-height:100vh}

/* AD TOP */
.ad-top{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 10px;display:flex;align-items:center;justify-content:center;min-height:60px}
.ad-ph{width:100%;max-width:728px;min-height:50px;background:#f9f9f9;border:1px dashed #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa}

/* NAVBAR */
.navbar{background:#fff;border-bottom:2px solid #e0e0e0;padding:0 14px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.back{background:#1565c0;border:none;color:#fff;width:34px;height:34px;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.nb-title{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px}
.logo-s{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;text-decoration:none;flex-shrink:0}
.lr{color:#c00}.lt{color:#333}.li{color:#e67e00}

/* HERO POSTER */
.hero-wrap{position:relative;width:100%;height:220px;overflow:hidden;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:80px}
.hero-wrap img{width:100%;height:100%;object-fit:cover;object-position:top}
.hero-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,#f4f4f4);z-index:2}

/* ANIME INFO */
.ani-wrap{max-width:700px;margin:0 auto;padding:0 14px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.bdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.3px}
.b-on{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.b-cm{background:#fff9c4;color:#f57f17;border:1px solid #ffe082}
.b-hi{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.b-hd{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.b-gn{background:#f3e5f5;color:#6a1b9a;border:1px solid #ce93d8}
.b-yr{background:#f5f5f5;color:#888;border:1px solid #e0e0e0}
.ani-title{font-family:'Teko',sans-serif;font-size:28px;font-weight:700;line-height:1.05;margin-bottom:3px}
.ani-sub{font-size:12px;color:#888;margin-bottom:14px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sbox{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sv{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;color:#1565c0}
.sk{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* DESCRIPTION */
.desc-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:13px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.desc-box h3{font-family:'Teko',sans-serif;font-size:15px;font-weight:700;color:#1565c0;margin-bottom:7px;letter-spacing:.5px}
.desc-txt{font-size:13px;color:#555;line-height:1.7;max-height:72px;overflow:hidden;transition:max-height .3s ease}
.desc-txt.exp{max-height:500px}
.rm-btn{background:none;border:none;color:#1565c0;font-size:12px;font-weight:600;cursor:pointer;padding:4px 0;display:block}

/* AD MID */
.ad-mid{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center;margin-bottom:14px;min-height:110px;display:flex;align-items:center;justify-content:center}

/* ACCESS SYSTEM */
.access-box{background:#fff;border:2px solid #1565c0;border-radius:10px;padding:16px;margin-bottom:16px;text-align:center;box-shadow:0 2px 10px rgba(21,101,192,.1)}
.access-box h3{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:#1565c0;margin-bottom:6px;letter-spacing:.5px}
.access-box p{font-size:12px;color:#555;margin-bottom:14px;line-height:1.6}
.access-steps{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.step{background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:10px;flex:1;max-width:140px;text-align:center}
.step-num{font-family:'Teko',sans-serif;font-size:24px;color:#1565c0;font-weight:700}
.step-txt{font-size:10px;color:#555;line-height:1.4}
.unlock-links{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ulink{display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px 14px;text-decoration:none;color:#222;transition:all .15s;gap:8px}
.ulink:hover{border-color:#1565c0;background:#e3f2fd}
.ulink.done{border-color:#2e7d32;background:#e8f5e9}
.ulink.done .ul-status{color:#2e7d32}
.ul-info{display:flex;align-items:center;gap:8px;flex:1}
.ul-icon{font-size:20px;flex-shrink:0}
.ul-text h4{font-size:13px;font-weight:600}
.ul-text span{font-size:11px;color:#888}
.ul-status{font-size:12px;font-weight:700;flex-shrink:0}
.access-note{font-size:11px;color:#888;background:#f9f9f9;border-radius:6px;padding:8px}

/* UNLOCKED BANNER */
.unlocked-banner{background:linear-gradient(135deg,#1b5e20,#2e7d32);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#fff}
.ub-icon{font-size:28px;flex-shrink:0}
.ub-info h3{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px}
.ub-info p{font-size:11px;opacity:.85}
.ub-timer{margin-left:auto;text-align:right;flex-shrink:0}
.ub-timer span{font-family:'Teko',sans-serif;font-size:22px;font-weight:700;color:#a5d6a7;display:block}
.ub-timer small{font-size:10px;opacity:.8}

/* EPISODE LIST */
.ep-section h2{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px;padding:0 0 10px;border-left:4px solid #1565c0;padding-left:10px;margin-bottom:12px}
.ep-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.ecard{background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ecard.open{border-color:#1565c0}
.ehead{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.enum{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;color:#1565c0;width:28px;flex-shrink:0}
.einfo-h{flex:1;min-width:0}
.etitle{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{display:flex;gap:5px;margin-top:3px}
.etag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.t-h{background:#ffebee;color:#c00}.t-hd{background:#e3f2fd;color:#1565c0}.t-dur{background:#f5f5f5;color:#888;border:1px solid #eee}
.earrow{font-size:12px;color:#bbb;transition:transform .25s;flex-shrink:0}
.ecard.open .earrow{transform:rotate(180deg);color:#1565c0}

/* LOCKED OVERLAY */
.locked-panel{padding:0 13px 13px;border-top:1px solid #eee}
.locked-msg{display:flex;align-items:center;gap:8px;background:#fff9c4;border:1px solid #ffe082;border-radius:7px;padding:10px 12px;margin-top:12px;font-size:12px;color:#795548}
.locked-msg .licon{font-size:18px;flex-shrink:0}

/* DOWNLOAD PANEL вҖ” unlocked */
.dpanel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.ecard.open .dpanel{max-height:350px}
.dp-inner{padding:0 13px 13px;border-top:1px solid #eee}
.dq-label{font-family:'Teko',sans-serif;font-size:13px;letter-spacing:.5px;color:#888;margin:11px 0 8px}
.dl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.dlbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:7px;font-family:'Teko',sans-serif;font-size:15px;letter-spacing:.3px;cursor:pointer;text-decoration:none;transition:all .15s;border:1.5px solid #ddd;background:#f9f9f9;color:#333;font-weight:700}
.dlbtn:hover{transform:scale(1.03)}
.d1080{background:#ffebee;border-color:#ef9a9a;color:#c62828}
.d720{background:#e3f2fd;border-color:#90caf9;color:#1565c0}
.d480{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.d360{background:#f5f5f5;border-color:#e0e0e0;color:#888}
.dl-note{font-size:10px;color:#aaa;margin-top:8px;text-align:center}

/* BOTTOM NAV */
.pad-bot{height:68px}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:grid;grid-template-columns:repeat(3,1fr);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.07)}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;text-decoration:none;color:#888;font-size:10px;font-weight:600;gap:2px;transition:color .15s}
.bn-item:hover{color:#1565c0}.bn-icon{font-size:20px}
</style>
</head>
<body>

<div class="ad-top">
  <div class="ad-ph"><!-- Monetag 728x90 Yahan -->Advertisement</div>
</div>

<nav class="navbar">
  <a href="index.html" class="back">вҶҗ</a>
  <span class="nb-title" id="nbTitle">Loading...</span>
  <a href="index.html" class="logo-s"><span class="lr">A</span><span class="lt">W</span><span class="li">I</span></a>
</nav>

<div id="pageContent">
  <div style="text-align:center;padding:80px 20px;color:#aaa">
    <div style="font-size:40px;margin-bottom:12px">вҸі</div>
    <p>Loading...</p>
  </div>
</div>

<div class="pad-bot"></div>
<nav class="bot-nav">
  <a href="index.html" class="bn-item"><div class="bn-icon">рҹҸ </div>Home</a>
  <a href="index.html" class="bn-item"><div class="bn-icon">рҹ”Қ</div>Search</a>
  <a href="index.html" class="bn-item"><div class="bn-icon">рҹ“ә</div>Anime</a>
  
</nav>

<script>
// ============================================================
// 24HR ACCESS SYSTEM
// ============================================================
const ACCESS_KEY='awi24hr';
const CLICK_KEY='awiClicks';

function isUnlocked(){
  const d=localStorage.getItem(ACCESS_KEY);
  if(!d)return false;
  return Date.now()<parseInt(d);
}
function getTimeLeft(){
  const d=localStorage.getItem(ACCESS_KEY);
  if(!d)return null;
  const ms=parseInt(d)-Date.now();
  if(ms<=0)return null;
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return h+'h '+m+'m';
}
function getClicks(){
  return JSON.parse(localStorage.getItem(CLICK_KEY)||'{}');
}
function markClick(animeId,linkNum){
  const c=getClicks();
  const k=animeId+'_'+linkNum;
  c[k]=Date.now();
  localStorage.setItem(CLICK_KEY,JSON.stringify(c));
  // Check if both links clicked
  if(c[animeId+'_1']&&c[animeId+'_2']){
    // Unlock for 24hrs
    localStorage.setItem(ACCESS_KEY,Date.now()+24*3600000);
    // Refresh page
    setTimeout(()=>{renderAnime(anime);updateTimer();},800);
  }
  checkBothClicked(animeId);
}
function checkBothClicked(animeId){
  const c=getClicks();
  const k1=animeId+'_1',k2=animeId+'_2';
  if(c[k1]){
    const el=document.getElementById('ul1');
    if(el){el.classList.add('done');el.querySelector('.ul-status').textContent='вң… Done';}
  }
  if(c[k2]){
    const el=document.getElementById('ul2');
    if(el){el.classList.add('done');el.querySelector('.ul-status').textContent='вң… Done';}
  }
}

// ============================================================
// MAIN
// ============================================================
const DB='awiDB';
const EM=['вҡ”пёҸ','рҹ”®','рҹ—ЎпёҸ','рҹҢҖ','рҹ’Ҙ','рҹ”Ҙ','вҡЎ','рҹҢҠ','рҹ‘Ҡ','рҹӨ–','рҹ’Җ','рҹҢё'];
const E=i=>EM[i%EM.length];
const GR=['linear-gradient(135deg,#ccc,#eee)'];

const params=new URLSearchParams(window.location.search);
const animeId=parseInt(params.get('id'));
const db=JSON.parse(localStorage.getItem(DB)||'[]');
const anime=db.find(a=>a.id===animeId);

if(!anime){
  document.getElementById('pageContent').innerHTML=`
  <div style="text-align:center;padding:80px 20px;color:#aaa">
    <div style="font-size:60px;margin-bottom:16px">рҹ”Қ</div>
    <h2 style="font-family:'Teko',sans-serif;font-size:24px;color:#888;margin-bottom:10px">ANIME NAHI MILA</h2>
    <a href="index.html" style="color:#1565c0;text-decoration:none;font-weight:600">вҶҗ Wapas Jao</a>
  </div>`;
  document.getElementById('nbTitle').textContent='Not Found';
} else {
  document.title=anime.name+(anime.season?' '+anime.season:'')+' вҖ” AnimeWorld India';
  document.getElementById('nbTitle').textContent=anime.name+(anime.season?' '+anime.season:'');
  renderAnime(anime);
}

function renderAnime(a){
  const dbI=db.findIndex(x=>x.id===a.id);
  const unlocked=isUnlocked();
  const timeLeft=getTimeLeft();
  const eps=a.episodes||[];

  document.getElementById('pageContent').innerHTML=`
  <!-- HERO -->
  <div class="hero-wrap">
    ${a.poster?`<img src="${a.poster}" alt="${a.name}" onerror="this.style.display='none'">`:`<div>${E(dbI)}</div>`}
  </div>

  <div class="ani-wrap">
    <!-- BADGES + TITLE -->
    <div class="badges" style="margin-top:10px">
      ${a.status?`<span class="bdg ${a.status==='Ongoing'||a.status==='Airing'?'b-on':'b-cm'}">${a.status}</span>`:''}
      <span class="bdg b-hi">рҹҮ®рҹҮі ${a.language||'Hindi Dub'}</span>
      ${a.quality?`<span class="bdg b-hd">${a.quality}</span>`:''}
      ${a.genre?`<span class="bdg b-gn">${a.genre}</span>`:''}
      ${a.year?`<span class="bdg b-yr">${a.year}</span>`:''}
    </div>
    <div class="ani-title">${a.name}${a.season?' '+a.season:''}</div>
    <div class="ani-sub">${a.studio||''}</div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="sbox"><div class="sv">${eps.length||a.totalEps||'?'}</div><div class="sk">Episodes</div></div>
      <div class="sbox"><div class="sv">${a.rating||'?'}</div><div class="sk">Rating</div></div>
      <div class="sbox"><div class="sv">${a.quality||'HD'}</div><div class="sk">Quality</div></div>
      <div class="sbox"><div class="sv">${a.year||'вҖ”'}</div><div class="sk">Year</div></div>
    </div>

    ${a.description?`
    <div class="desc-box">
      <h3>рҹ“– STORY</h3>
      <div class="desc-txt" id="descTxt">${a.description}</div>
      <button class="rm-btn" onclick="toggleDesc()">в–ј Read More</button>
    </div>`:''}

    <!-- AD MID -->
    <div class="ad-mid">
      <div class="ad-ph" style="min-height:100px;max-width:336px;width:100%">
        <!-- Monetag 300x250 Yahan -->Advertisement
      </div>
    </div>

    <!-- ACCESS SECTION -->
    ${unlocked?`
    <div class="unlocked-banner">
      <div class="ub-icon">рҹ”“</div>
      <div class="ub-info">
        <h3>рҹҺү ACCESS UNLOCKED!</h3>
        <p>You can now download all episodes freely</p>
      </div>
      <div class="ub-timer">
        <span id="timer">${timeLeft||'вҖ”'}</span>
        <small>time left</small>
      </div>
    </div>`:`
    <div class="access-box">
      <h3>рҹ”җ рҹ”җ UNLOCK FREE ACCESS</h3>
      <p>Click the 2 links below to get <strong>24-hour unlimited free access</strong> to all episodes!</p>
      <div class="access-steps">
        <div class="step"><div class="step-num">1</div><div class="step-txt">Click Link 1</div></div>
        <div class="step"><div class="step-num">+</div><div class="step-txt"> </div></div>
        <div class="step"><div class="step-num">2</div><div class="step-txt">Click Link 2</div></div>
      </div>
      <div class="unlock-links">
        <a href="${a.unlockLink1||'#'}" target="_blank" rel="noopener" class="ulink" id="ul1" onclick="markClick(${a.id},1)">
          <div class="ul-info">
            <div class="ul-icon">рҹ”—</div>
            <div class="ul-text"><h4>Access Link 1</h4><span>Click and wait a few seconds</span></div>
          </div>
          <div class="ul-status">Click в–¶</div>
        </a>
        <a href="${a.unlockLink2||'#'}" target="_blank" rel="noopener" class="ulink" id="ul2" onclick="markClick(${a.id},2)">
          <div class="ul-info">
            <div class="ul-icon">рҹ”—</div>
            <div class="ul-text"><h4>Access Link 2</h4><span>Click and wait a few seconds</span></div>
          </div>
          <div class="ul-status">Click в–¶</div>
        </a>
      </div>
      <div class="access-note">вҸұ After clicking both links, enjoy 24hr free access to all anime В· Come back tomorrow for more!</div>
    </div>`}

    <!-- EPISODES -->
    <div class="ep-section">
      <h2>рҹ“ә EPISODES (${eps.length})</h2>
      <div class="ep-list" id="epList"></div>
    </div>

  </div><!-- /ani-wrap -->`;

  renderEpisodes(eps, unlocked);
  if(!unlocked)checkBothClicked(animeId);
  if(unlocked)updateTimer();
}

function renderEpisodes(eps,unlocked){
  const el=document.getElementById('epList');
  if(!eps||!eps.length){
    el.innerHTML='<p style="color:#aaa;text-align:center;padding:20px;font-size:13px">No episodes added yet.</p>';
    return;
  }
  const sorted=[...eps].sort((a,b)=>a.num-b.num);
  el.innerHTML=sorted.map((ep,i)=>`
  <div class="ecard" id="ec${i}" style="animation-delay:${Math.min(i*.04,.4)}s">
    <div class="ehead" onclick="toggleEp(${i},${unlocked})">
      <div class="enum">${String(ep.num).padStart(2,'0')}</div>
      <div class="einfo-h">
        <div class="etitle">${ep.title||'Episode '+ep.num}</div>
        <div class="emeta">
          <span class="etag t-h">HINDI</span>
          <span class="etag t-hd">HD</span>
          <span class="etag t-dur">вҸұ ${ep.duration||'24m'}</span>
        </div>
      </div>
      <div class="earrow">${unlocked?'в–ј':'рҹ”’'}</div>
    </div>
    ${unlocked?`
    <div class="dpanel">
      <div class="dp-inner">
        <div class="dq-label">рҹ“Ҙ SELECT QUALITY</div>
        <div class="dl-grid">
          ${ep.links?.['1080p']?`<a href="${ep.links['1080p']}" target="_blank" rel="noopener" class="dlbtn d1080">рҹ”ҙ 1080p</a>`:''}
          ${ep.links?.['720p']?`<a href="${ep.links['720p']}" target="_blank" rel="noopener" class="dlbtn d720">рҹ”ө 720p</a>`:''}
          ${ep.links?.['480p']?`<a href="${ep.links['480p']}" target="_blank" rel="noopener" class="dlbtn d480">рҹҹў 480p</a>`:''}
          ${ep.links?.['360p']?`<a href="${ep.links['360p']}" target="_blank" rel="noopener" class="dlbtn d360">вҡӘ 360p</a>`:''}
        </div>
        <div class="dl-note">вҡЎ Links are via shortener вҖ” a short ad will appear</div>
      </div>
    </div>`:`
    <div class="locked-panel" style="display:none" id="lp${i}">
      <div class="locked-msg">
        <div class="licon">рҹ”җ</div>
        <div>Click the 2 links above to get 24-hour unlimited free access!</div>
      </div>
    </div>`}
  </div>`).join('');
}

function toggleEp(i,unlocked){
  const c=document.getElementById('ec'+i);
  if(!unlocked){
    const lp=document.getElementById('lp'+i);
    if(lp){lp.style.display=lp.style.display==='none'?'block':'none';}
    return;
  }
  const isOpen=c.classList.contains('open');
  document.querySelectorAll('.ecard').forEach(x=>x.classList.remove('open'));
  if(!isOpen)c.classList.add('open');
}

function toggleDesc(){
  const d=document.getElementById('descTxt');
  const b=document.querySelector('.rm-btn');
  d.classList.toggle('exp');
  b.textContent=d.classList.contains('exp')?'в–І Read Less':'в–ј Read More';
}

function updateTimer(){
  const t=document.getElementById('timer');
  if(!t)return;
  t.textContent=getTimeLeft()||'Expired';
  setTimeout(updateTimer,60000);
}
</script>
</body>
</html>
