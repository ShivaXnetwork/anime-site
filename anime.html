<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f4f4;color:#222;font-family:'Hind',sans-serif;min-height:100vh}
.ad-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 10px;display:flex;align-items:center;justify-content:center;min-height:58px}
.ad-ph{width:100%;max-width:728px;min-height:50px;background:#f9f9f9;border:1px dashed #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#bbb}
.navbar{background:#fff;border-bottom:2px solid #e0e0e0;padding:0 14px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.back{background:#1565c0;border:none;color:#fff;width:34px;height:34px;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.nb-title{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.logo-s{font-family:'Teko',sans-serif;font-size:16px;font-weight:700;text-decoration:none;flex-shrink:0}
.lr{color:#c00}.lt{color:#333}.li{color:#e67e00}
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 30px}

/* SKELETON */
.sk-poster{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;margin-bottom:14px}
.sk-line{height:14px;border-radius:4px;background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:8px}
.sk-line.w70{width:70%}.sk-line.w50{width:50%}.sk-line.w90{width:90%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* POSTER */
.poster-wrap{width:100%;border-radius:10px;overflow:hidden;margin-bottom:16px;background:#eee;max-height:360px}
.poster-wrap img{width:100%;object-fit:cover;object-position:top;display:block}

/* TAGS */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.3px}
.t-hi{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.t-hd{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.t-gn{background:#f3e5f5;color:#6a1b9a;border:1px solid #ce93d8}
.t-st{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}

/* ANIME TITLE */
.anime-title{font-family:'Teko',sans-serif;font-size:24px;font-weight:700;line-height:1.1;margin-bottom:10px}

/* INFO */
.info-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.info-row{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:#999;min-width:100px;flex-shrink:0}
.info-val{color:#222;font-weight:500;color:#2e7d32}

/* SYNOPSIS */
.syn-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.syn-box h3{font-family:'Teko',sans-serif;font-size:16px;color:#1565c0;margin-bottom:7px;letter-spacing:.5px}
.syn-txt{font-size:13px;color:#555;line-height:1.75;max-height:72px;overflow:hidden;transition:max-height .3s ease}
.syn-txt.exp{max-height:600px}
.rm-btn{background:none;border:none;color:#1565c0;font-size:12px;font-weight:600;cursor:pointer;padding:5px 0;display:block;margin-top:4px}

/* AD MID */
.ad-mid{background:#fff;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;min-height:110px;padding:14px}

/* ACCESS BOX */
.access-box{background:#fff;border:2px solid #1565c0;border-radius:12px;padding:18px 16px;margin-bottom:16px;text-align:center;box-shadow:0 2px 10px rgba(21,101,192,.1)}
.access-box h3{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:#1565c0;margin-bottom:5px;letter-spacing:.5px}
.access-box p{font-size:12px;color:#555;margin-bottom:14px;line-height:1.6}
.access-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:9px;font-family:'Teko',sans-serif;font-size:17px;letter-spacing:.5px;cursor:pointer;text-decoration:none;border:none;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;transition:opacity .2s;margin-bottom:10px}
.access-btn:hover{opacity:.9}
.access-note{font-size:11px;color:#aaa;background:#f9f9f9;border-radius:6px;padding:8px;line-height:1.6}

/* UNLOCKED */
.unlocked-banner{background:linear-gradient(135deg,#1b5e20,#2e7d32);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;color:#fff}
.ub-icon{font-size:28px;flex-shrink:0}
.ub-text h3{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px}
.ub-text p{font-size:11px;opacity:.8}
.ub-timer{margin-left:auto;text-align:right;flex-shrink:0}
.ub-timer span{font-family:'Teko',sans-serif;font-size:20px;color:#a5d6a7;display:block}
.ub-timer small{font-size:10px;opacity:.75}

/* EPISODES — RareToonIndia style */
.ep-section{margin-bottom:16px}
.ep-section h2{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:#1565c0;border-left:4px solid #1565c0;padding-left:10px;margin-bottom:14px;letter-spacing:.5px}
.ep-row{padding:11px 0;border-bottom:1px solid #f0f0f0}
.ep-row:last-child{border-bottom:none}
.ep-num-title{font-size:14px;font-weight:600;color:#222;margin-bottom:5px}
.ep-links{display:flex;flex-wrap:wrap;align-items:center;gap:5px;font-size:13px}
.lang-lbl{color:#2e7d32;font-weight:700}
.dl-link{color:#1565c0;font-weight:700;text-decoration:none}
.dl-link:hover{text-decoration:underline}
.locked-note{font-size:12px;color:#bbb;margin-top:4px;display:flex;align-items:center;gap:5px}

/* SEASON ZIP */
.zip-section{margin-bottom:16px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.zip-section h2{font-family:'Teko',sans-serif;font-size:18px;color:#2e7d32;border-left:4px solid #2e7d32;padding-left:10px;margin-bottom:12px;letter-spacing:.5px}
.zip-card{text-align:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.zip-card:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.zip-title{font-family:'Teko',sans-serif;font-size:16px;color:#6a1b9a;font-weight:700;margin-bottom:4px}
.zip-meta{font-size:11px;color:#888;margin-bottom:8px}
.zip-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.zip-link{color:#1565c0;font-weight:700;text-decoration:none;font-size:14px;padding:5px 12px;background:#e3f2fd;border-radius:6px;border:1px solid #90caf9}
.zip-link:hover{background:#bbdefb}

/* BOTTOM NAV */
.pad-bot{height:68px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:grid;grid-template-columns:repeat(3,1fr);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.07)}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;text-decoration:none;color:#888;font-size:10px;font-weight:600;gap:2px}
.bn-item:hover{color:#1565c0}.bn-icon{font-size:20px}

/* TOAST */
.toast-fixed{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#1565c0;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast-fixed.show{opacity:1}

.loading-screen{text-align:center;padding:60px 20px;color:#aaa}
</style>
</head>
<body>

<div class="ad-bar"><div class="ad-ph"><!-- Monetag 728x90 -->Advertisement</div></div>

<nav class="navbar">
  <a href="index.html" class="back">←</a>
  <span class="nb-title" id="nbTitle">Loading...</span>
  <a href="index.html" class="logo-s"><span class="lr">A</span><span class="lt">W</span><span class="li">I</span></a>
</nav>

<div id="pageContent">
  <!-- Skeleton Loading -->
  <div class="wrap">
    <div class="sk-poster"></div>
    <div class="sk-line w90"></div>
    <div class="sk-line w70"></div>
    <div class="sk-line w50"></div>
  </div>
</div>

<div class="pad-bot"></div>
<nav class="bnav">
  <a href="index.html" class="bn-item"><div class="bn-icon">🏠</div>Home</a>
  <a href="index.html" class="bn-item"><div class="bn-icon">🔍</div>Search</a>
  <a href="index.html" class="bn-item"><div class="bn-icon">📺</div>Anime</a>
</nav>
<div class="toast-fixed" id="toastEl"></div>

<script>
// ============================================================
// ACCESS CHECK
// ============================================================
const ACCESS_KEY='awi24hr';
const CLICK_KEY='awiClicks';

function isUnlocked(){
  const d=localStorage.getItem(ACCESS_KEY);
  return d&&Date.now()<parseInt(d);
}
function getTimeLeft(){
  const d=localStorage.getItem(ACCESS_KEY);
  if(!d)return null;
  const ms=parseInt(d)-Date.now();
  if(ms<=0)return null;
  return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';
}

function toast(msg){
  const t=document.getElementById('toastEl');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function fixPoster(url){
  if(!url)return '';
  return url.replace('https://ibb.co/','https://i.ibb.co/').replace('http://ibb.co/','https://i.ibb.co/');
}

// ============================================================
// RENDER PAGE
// ============================================================
let currentAnime=null;

function renderPage(a){
  currentAnime=a;
  const unlocked=isUnlocked();
  const eps=a.episodes||[];
  const packs=a.seasonPacks||[];

  document.title=a.name+(a.season?' '+a.season:'')+' — AnimeWorld India';
  document.getElementById('nbTitle').textContent=a.name+(a.season?' '+a.season:'');

  // Info rows
  const infoRows=[
    {l:'📺 Full Name',v:a.name},
    a.season&&{l:'🎬 Season',v:a.season},
    (a.totalEps||eps.length)&&{l:'📼 Episodes',v:a.totalEps||eps.length},
    a.year&&{l:'🕐 Year',v:a.year},
    a.runtime&&{l:'⌛ Runtime',v:a.runtime},
    a.genre&&{l:'🎭 Genre',v:a.genre},
    a.language&&{l:'🌐 Language',v:a.language||'Hindi Dub'},
    a.quality&&{l:'🎥 Quality',v:a.quality},
    a.status&&{l:'📡 Status',v:a.status},
  ].filter(Boolean);

  // Episodes HTML
  const sortedEps=[...eps].sort((x,y)=>x.num-y.num);
  const epHtml=sortedEps.map(ep=>{
    const links=ep.links||{};
    const hasLinks=Object.values(links).some(l=>l);
    if(!hasLinks)return '';
    if(!unlocked){
      return `<div class="ep-row">
        <div class="ep-num-title">Episode ${String(ep.num).padStart(2,'0')} – ${ep.title||'Episode '+ep.num}</div>
        <div class="locked-note">🔒 Unlock access above to download</div>
      </div>`;
    }
    const qLinks=Object.entries(links).filter(([q,l])=>l)
      .map(([q,l])=>`<a href="${l}" target="_blank" rel="noopener" class="dl-link">[${q}]</a>`).join(' ');
    return `<div class="ep-row">
      <div class="ep-num-title">Episode ${String(ep.num).padStart(2,'0')} – ${ep.title||'Episode '+ep.num}</div>
      <div class="ep-links"><span class="lang-lbl">Hindi</span> <span>–</span> ${qLinks}</div>
    </div>`;
  }).join('');

  // Season packs HTML
  const packHtml=packs.map(sp=>{
    const links=sp.links||{};
    const lBtns=Object.entries(links).filter(([q,l])=>l)
      .map(([q,l])=>unlocked
        ?`<a href="${l}" target="_blank" class="zip-link">${q}</a>`
        :`<span style="color:#bbb;font-size:12px">🔒 Unlock first</span>`).join('');
    return `<div class="zip-card">
      <div class="zip-title">📦 ${sp.title||'Full Season Pack'}</div>
      <div class="zip-meta">${sp.episodes?sp.episodes+' Episodes · ':''}${sp.size?sp.size+' · ':''}${sp.quality||''}</div>
      <div class="zip-links">${lBtns}</div>
    </div>`;
  }).join('');

  // Build continue URL
  const retUrl=encodeURIComponent(window.location.href);
  const continueUrl=`continue.html?aid=${a.id}&l1=${encodeURIComponent(a.unlockLink1||'')}&l2=${encodeURIComponent(a.unlockLink2||'')}&ret=${retUrl}`;

  // Access section
  const accessHtml=unlocked?`
  <div class="unlocked-banner">
    <div class="ub-icon">🔓</div>
    <div class="ub-text">
      <h3>ACCESS UNLOCKED!</h3>
      <p>Download all episodes freely</p>
    </div>
    <div class="ub-timer">
      <span id="timerTxt">${getTimeLeft()||'—'}</span>
      <small>time left</small>
    </div>
  </div>`:`
  <div class="access-box">
    <h3>🔐 UNLOCK FREE ACCESS</h3>
    <p>Click below to unlock <strong>24-hour unlimited access</strong> to all episodes!</p>
    <a href="${continueUrl}" class="access-btn">🔗 Click Here to Unlock Free Access</a>
    <div class="access-note">⏱ Complete 2 quick steps → Get 24hr free access to all anime · Come back tomorrow!</div>
  </div>`;

  document.getElementById('pageContent').innerHTML=`<div class="wrap">

    ${a.poster?`<div class="poster-wrap"><img src="${fixPoster(a.poster)}" alt="${a.name}" onerror="this.parentElement.style.display='none'"></div>`:''}

    <div class="anime-title">${a.name}${a.season?' '+a.season:''} Hindi Dubbed Episodes Download HD</div>

    <div class="tags">
      <span class="tag t-hi">🇮🇳 ${a.language||'Hindi Dub'}</span>
      ${a.quality?`<span class="tag t-hd">${a.quality}</span>`:''}
      ${a.genre?a.genre.split(',').map(g=>`<span class="tag t-gn">${g.trim()}</span>`).join(''):''}
      ${a.status?`<span class="tag t-st">${a.status}</span>`:''}
    </div>

    <div class="info-box">
      ${infoRows.map(r=>`<div class="info-row"><span class="info-label">${r.l}</span><span class="info-val">${r.v}</span></div>`).join('')}
    </div>

    ${a.description?`
    <div class="syn-box">
      <h3>📖 SYNOPSIS</h3>
      <div class="syn-txt" id="synTxt">${a.description}</div>
      <button class="rm-btn" onclick="toggleSyn()">▼ Read More</button>
    </div>`:''}

    <div class="ad-mid"><div class="ad-ph" style="max-width:336px;width:100%;min-height:90px"><!-- Monetag 300x250 -->Advertisement</div></div>

    ${accessHtml}

    ${packs.length?`
    <div class="zip-section">
      <h2>📦 SEASON ZIP / BATCH</h2>
      <p style="font-size:12px;color:#888;text-align:center;margin-bottom:10px">Download All Episodes at Once</p>
      ${packHtml}
    </div>`:''}

    ${eps.length?`
    <div class="ep-section">
      <h2>📺 EPISODES (${eps.length})</h2>
      ${epHtml||'<p style="color:#bbb;font-size:13px;text-align:center;padding:20px">No episodes yet.</p>'}
    </div>`:''}

  </div>`;

  // Start timer
  if(unlocked){
    setInterval(()=>{
      const t=document.getElementById('timerTxt');
      if(t)t.textContent=getTimeLeft()||'Expired';
    },60000);
  }
}

function toggleSyn(){
  const d=document.getElementById('synTxt');
  const b=document.querySelector('.rm-btn');
  if(!d)return;
  d.classList.toggle('exp');
  b.textContent=d.classList.contains('exp')?'▲ Read Less':'▼ Read More';
}

// ============================================================
// FIREBASE LOAD
// ============================================================
const params=new URLSearchParams(window.location.search);
const animeId=params.get('id');

async function loadAnime(){
  if(!animeId){showNotFound();return;}
  try{
    // Direct doc fetch
    const doc=await fdb.collection('anime').doc(String(animeId)).get();
    if(doc.exists){
      renderPage({id:doc.id,...doc.data()});
      return;
    }
    // Fallback scan (for old numeric ids)
    const snap=await fdb.collection('anime').get();
    const found=snap.docs.map(d=>({id:d.id,...d.data()})).find(a=>String(a.id)===String(animeId)||a.legacyId===animeId);
    if(found)renderPage(found);
    else showNotFound();
  }catch(e){
    console.error(e);
    document.getElementById('pageContent').innerHTML=`
    <div class="loading-screen">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <p>Connection error. <a href="" style="color:#1565c0">Retry</a></p>
    </div>`;
    document.getElementById('nbTitle').textContent='Error';
  }
}

function showNotFound(){
  document.getElementById('pageContent').innerHTML=`
  <div class="loading-screen">
    <div style="font-size:50px;margin-bottom:12px">🔍</div>
    <h2 style="font-family:'Teko',sans-serif;font-size:22px;color:#888;margin-bottom:10px">ANIME NOT FOUND</h2>
    <a href="index.html" style="color:#1565c0;text-decoration:none;font-weight:600">← Go Back</a>
  </div>`;
  document.getElementById('nbTitle').textContent='Not Found';
}

loadAnime();
</script>
</body>
</html>
