<!DOCTYPE html>
<html lang="en">

const fdb=firebase.firestore();
</script>
<style>
:root { --bg: #0f1115; --card: #181a20; --nav: #181a20; --accent: #0084ff; --text: #bbb; --border: #262933; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

.navbar{background:var(--nav);padding:0 16px;display:flex;align-items:center;gap:12px;height:65px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.back{color:#fff;font-size:24px;text-decoration:none;padding:5px}
.logo-text{font-size:20px;font-weight:700;color:#fff;flex:1}

.wrap{max-width:800px;margin:0 auto;padding:20px 16px 50px}
.poster{width:100%;border-radius:12px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.5);display:block}
.title{font-size:24px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:12px}

.info-box{background:var(--card);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border)}
.info-row{display:flex;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.il{color:#888;width:90px;flex-shrink:0}
.iv{color:#fff;font-weight:500}

/* SOCIAL & REACTIONS */
.social-bar{display:flex;justify-content:center;gap:15px;margin-bottom:25px}
.soc-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;text-decoration:none;background:#262933}
.soc-tg{background:#0088cc} .soc-yt{background:#ff0000}

.react-box{text-align:center;margin-bottom:30px}
.react-box h3{color:#fff;font-size:18px;margin-bottom:12px}
.emojis{display:flex;justify-content:center;gap:12px;background:var(--card);padding:10px;border-radius:30px;border:1px solid var(--border);display:inline-flex}
.emojis span{font-size:28px;cursor:pointer;transition:transform .2s}
.emojis span:hover{transform:scale(1.2)}

/* MAIN DOWNLOAD BTN */
.main-btn{display:block;width:100%;max-width:300px;margin:0 auto 30px;background:linear-gradient(45deg,#0084ff,#00c6ff);color:#fff;text-align:center;padding:14px;border-radius:8px;font-size:18px;font-weight:700;text-decoration:none;box-shadow:0 5px 20px rgba(0,132,255,.4)}

/* EPISODE LIST (Raretoon Style) */
.ep-list{margin-bottom:40px}
.ep-list h2{font-size:20px;color:#fff;margin-bottom:16px;border-left:4px solid var(--accent);padding-left:10px}
.rt-row{background:var(--card);padding:16px;border-radius:8px;margin-bottom:12px;border:1px solid var(--border)}
.rt-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:10px}
.rt-links{font-size:13px;color:#aaa}
.rt-btn{color:var(--accent);text-decoration:none;font-weight:600;margin:0 5px}
.rt-btn:hover{text-decoration:underline}
.rt-locked{color:#ff4656;font-weight:600}

/* COMMENTS */
.comment-box{background:var(--card);padding:20px;border-radius:12px;border:1px solid var(--border)}
.comment-box h3{color:#fff;font-size:18px;margin-bottom:15px}
.c-inp{width:100%;background:var(--bg);border:1px solid var(--border);color:#fff;padding:12px;border-radius:8px;font-family:'Poppins';margin-bottom:10px;outline:none}
.c-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<nav class="navbar"><a href="index.html" class="back">←</a><div class="logo-text">AWI.TO</div></nav>

<div id="content"><div class="wrap"><div style="text-align:center;padding:50px;color:#fff">Loading...</div></div></div>

<script>
const ACCESS_KEY = 'awi24hr_v2';
const isUnlocked = () => { const a = JSON.parse(localStorage.getItem(ACCESS_KEY)||'null'); return a && Date.now() < a.expiry; };

let gSet = {};
async function loadS() { try { const d = await fdb.collection('settings').doc('unlock').get(); if(d.exists) gSet = d.data(); } catch(e){} }
function getUrl(aid) {
  const t = btoa(aid + '_' + Math.floor(Date.now() / 86400000)).substring(0, 12);
  let u = `continue.html?token=${t}&aid=${aid}&ret=${encodeURIComponent(window.location.href)}`;
  if(gSet.link1) u += `&l1=${encodeURIComponent(gSet.link1)}`; return u;
}

function renderP(a) {
  const un = isUnlocked();
  const eps = (a.episodes||[]).sort((x,y)=>x.num-y.num);

  const epHtml = eps.map(e => {
    if(!un) return `<div class="rt-row"><div class="rt-title">Episode ${String(e.num).padStart(2,'0')} – ${e.title||'Episode '+e.num}</div><div class="rt-links">Hindi – <span class="rt-locked">🔒 Unlock to Download</span></div></div>`;
    
    const links = Object.entries(e.links||{}).filter(([q,l])=>l).map(([q,l]) => {
      const h = l.short||l.direct||''; return h ? `<a href="${h}" target="_blank" class="rt-btn">[Download ${q}]</a>` : '';
    }).join('');
    return `<div class="rt-row"><div class="rt-title">Episode ${String(e.num).padStart(2,'0')} – ${e.title||'Episode '+e.num}</div><div class="rt-links">Hindi – ${links}</div></div>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="wrap">
    <img src="${a.poster?a.poster.replace('ibb.co','i.ibb.co'):''}" class="poster">
    <h1 class="title">${a.name} ${a.season||''} Hindi Dubbed Download HD</h1>
    
    <div class="info-box">
      <div class="info-row"><span class="il">Genres</span><span class="iv">${a.genre||'Anime'}</span></div>
      <div class="info-row"><span class="il">Status</span><span class="iv">${a.status||'Ongoing'}</span></div>
      <div class="info-row"><span class="il">Episodes</span><span class="iv">${eps.length}</span></div>
    </div>

    <div class="social-bar">
      <a href="#" class="soc-btn soc-tg">✈️</a>
      <a href="#" class="soc-btn soc-yt">▶</a>
      <a href="#" class="soc-btn">📸</a>
    </div>

    <div class="react-box">
      <h3>What's your Reaction?</h3>
      <div class="emojis"><span>❤️</span><span>😲</span><span>😂</span><span>😢</span></div>
    </div>

    ${!un ? `<a href="${getUrl(a.id)}" class="main-btn">🔓 UNLOCK ACCESS</a>` : `<div style="text-align:center;color:#0084ff;font-weight:700;margin-bottom:20px">✅ Access Unlocked!</div>`}

    <div class="ep-list"><h2>Download Links</h2>${epHtml||'<p style="color:#888">No episodes added yet.</p>'}</div>

    <div class="comment-box">
      <h3>Leave a Comment</h3>
      <textarea class="c-inp" rows="4" placeholder="Type here..."></textarea>
      <input class="c-inp" type="text" placeholder="Name*">
      <button class="c-btn">Post Comment</button>
    </div>
  </div>`;
}

async function init(){
  const aid = new URLSearchParams(window.location.search).get('id');
  if(!aid) return; await loadS();
  fdb.collection('anime').doc(aid).onSnapshot(d => {
    if(d.exists) {
      const a = {id: d.id, ...d.data()};
      fdb.collection('episodes').where('animeId','==',aid).onSnapshot(s => {
        a.episodes = s.docs.map(x=>x.data()); renderP(a);
      });
    }
  });
}
init();
</script>
</body>
</html>
