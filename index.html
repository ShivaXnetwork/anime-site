<html lang="en">

<title>AWI.TO - Watch Anime Online Free</title>

<style>
:root { 
  --bg: #0b0c0f; 
  --card: #14151a; 
  --nav: #14151a; 
  --accent: #ff4656; /* Aniwatch Pink/Red */
  --text: #aaa; 
  --text-light: #fff; 
  --border: #23252b; 
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

/* NAVBAR */
.navbar{background:var(--nav);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:6px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
.logo-text{font-size:22px;font-weight:700;color:#fff;letter-spacing:0.5px}
.nav-right{display:flex;gap:12px;align-items:center}
.nb{background:none;border:none;font-size:20px;cursor:pointer;color:#fff}
.menu-btn{background:#1f222a;border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* SEARCH OVERLAY */
.srch-ov{position:fixed;inset:0;background:rgba(11,12,15,.95);z-index:300;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.srch-ov.open{display:flex}
.srch-box{background:var(--card);width:100%;max-width:600px;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:0 16px}
.srch-head{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);gap:10px}
.srch-inp{flex:1;border:none;outline:none;font-size:16px;font-family:'Poppins',sans-serif;background:transparent;color:#fff}
.srch-cls{background:none;border:none;font-size:24px;cursor:pointer;color:#888}
.srch-res{max-height:400px;overflow-y:auto}
.srch-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);text-decoration:none;transition:background .2s}
.srch-item:hover{background:#1f222a}
.srch-thumb{width:50px;height:70px;border-radius:4px;background:#111;overflow:hidden;flex-shrink:0}
.srch-thumb img{width:100%;height:100%;object-fit:cover}
.srch-info h4{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.srch-info span{font-size:12px;color:#888}
.srch-empty{padding:30px;text-align:center;color:#666;font-size:14px}

/* HERO SLIDER */
.hero-slider{position:relative;width:100%;height:260px;background:#000;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .6s ease;display:flex}
.slide.active{opacity:1}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top, #0b0c0f 0%, rgba(11,12,15,0.2) 100%)}
.slide-content{position:absolute;bottom:0;left:0;padding:24px;color:#fff;width:100%}
.slide-badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.slide-title{font-size:24px;font-weight:700;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 4px rgba(0,0,0,.8)}
.slide-btn{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:30px;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-top:8px}

/* GENRES */
.genre-bar{background:var(--nav);padding:14px 16px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
.genre-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;background:#1f222a;color:#aaa;transition:all .2s}
.chip.active,.chip:hover{background:var(--accent);color:#fff}

/* SECTIONS */
.sec-wrap{max-width:1100px;margin:0 auto;padding:10px 16px 30px}
.sec-head{font-size:20px;font-weight:700;color:#fff;margin:24px 0 16px;display:flex;align-items:center;gap:10px}
.sec-head::before{content:'';width:4px;height:20px;background:var(--accent);border-radius:4px}

/* ANIWATCH GRID STYLE */
.anime-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:480px){.anime-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.anime-grid{grid-template-columns:repeat(4,1fr);gap:16px}}
@media(min-width:1000px){.anime-grid{grid-template-columns:repeat(6,1fr)}}

.ac{text-decoration:none;display:block;position:relative}
.ac-img{position:relative;width:100%;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:#1a1c22}
.ac-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.ac:hover .ac-img img{transform:scale(1.05);filter:brightness(0.7)}

/* Play Button Hover */
.ac-img::after{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;color:var(--accent);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:all .3s;padding-left:3px;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.ac:hover .ac-img::after{opacity:1}

/* Badges (Sub/Dub/Ep) */
.badge-wrap{position:absolute;bottom:6px;left:6px;display:flex;gap:4px;z-index:2}
.bdg{font-size:10px;font-weight:600;padding:3px 6px;border-radius:4px;color:#111}
.b-sub{background:#fff}
.b-dub{background:var(--accent);color:#fff}
.b-ep{background:rgba(0,0,0,0.8);color:#fff;margin-left:auto;position:absolute;bottom:6px;right:6px}

.ac-info{padding:10px 0}
.ac-title{font-size:13px;font-weight:600;color:#fff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .2s}
.ac:hover .ac-title{color:var(--accent)}

/* BOTTOM NAV */
.pad-bot{height:70px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);z-index:100}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;text-decoration:none;color:#666;font-size:11px;font-weight:500;gap:4px}
.bn-item.active,.bn-item:hover{color:var(--accent)}
.bn-icon{font-size:18px}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">A</div>
    <div class="logo-text">AWI.TO</div>
  </a>
  <div class="nav-right">
    <button class="nb" onclick="openSearch()">🔍</button>
  </div>
</nav>

<div class="srch-ov" id="srchOv">
  <div class="srch-box">
    <div class="srch-head">
      <input class="srch-inp" id="srchInp" type="text" placeholder="Search anime..." oninput="doSearch(this.value)">
      <button class="srch-cls" onclick="closeSearch()">✕</button>
    </div>
    <div class="srch-res" id="srchRes"><div class="srch-empty">Start typing to search...</div></div>
  </div>
</div>

<div class="hero-slider" id="heroSlider"></div>

<div class="genre-bar" id="genreBar">
  <div class="chip active" data-g="All">All Anime</div>
  <div class="chip" data-g="Action">Action</div>
  <div class="chip" data-g="Shonen">Shonen</div>
  <div class="chip" data-g="Romance">Romance</div>
  <div class="chip" data-g="Isekai">Isekai</div>
</div>

<div class="sec-wrap">
  <div class="sec-head">Latest Updated</div>
  <div id="aniGrid"></div>
</div>

<div class="pad-bot"></div>
<nav class="bnav">
  <a href="index.html" class="bn-item active"><div class="bn-icon">🏠</div>Home</a>
  <a href="#" class="bn-item" onclick="openSearch();return false"><div class="bn-icon">🔍</div>Search</a>
  <a href="#" class="bn-item" onclick="document.querySelector('.chip[data-g=\\'Action\\']').click();return false"><div class="bn-icon">⚔️</div>Action</a>
</nav>

<script>
let animeCache=[];
let episodesCache=[];
let curGenre='All';

function fixPoster(url){return url?url.replace('https://ibb.co/','https://i.ibb.co/').replace('http://ibb.co/','https://i.ibb.co/'):'';}

fdb.collection('anime').orderBy('createdAt','desc').onSnapshot(snap=>{
  animeCache=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderCombined();
});

fdb.collection('episodes').onSnapshot(snap=>{
  episodesCache=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderCombined();
});

function renderCombined() {
  animeCache.forEach(a => a.episodes = episodesCache.filter(ep => ep.animeId === a.id));
  renderGrid(curGenre); renderSlider();
}

function renderSlider(){
  const items=animeCache.filter(a=>a.poster).slice(0,4);
  const slider=document.getElementById('heroSlider');
  if(!items.length) return slider.style.display='none';
  slider.innerHTML=`${items.map((a,i)=>`
    <div class="slide ${i===0?'active':''}" data-idx="${i}">
      <img src="${fixPoster(a.poster)}" style="width:100%;height:100%;object-fit:cover;object-position:top">
      <div class="slide-overlay"></div>
      <div class="slide-content">
        <div class="slide-badge">#${i+1} Spotlight</div>
        <div class="slide-title">${a.name}</div>
        <a href="anime.html?id=${a.id}" class="slide-btn">▶ Watch Now</a>
      </div>
    </div>`).join('')}`;
  
  // Auto slider
  let curr = 0;
  setInterval(() => {
    const slides = document.querySelectorAll('.slide');
    if(!slides.length) return;
    slides[curr].classList.remove('active');
    curr = (curr + 1) % slides.length;
    slides[curr].classList.add('active');
  }, 4000);
}

function renderGrid(genre='All'){
  const el=document.getElementById('aniGrid');
  const list=genre==='All'?animeCache:animeCache.filter(a=>(a.genre||'').includes(genre));
  
  el.innerHTML='<div class="anime-grid">'+list.map((a,i)=>`
  <a href="anime.html?id=${a.id}" class="ac">
    <div class="ac-img">
      <img src="${fixPoster(a.poster)}" loading="lazy" onerror="this.style.display='none'">
      <div class="badge-wrap">
        <span class="bdg b-sub">SUB</span>
        ${a.language && a.language.toLowerCase().includes('dub') ? '<span class="bdg b-dub">DUB</span>' : ''}
      </div>
      <span class="bdg b-ep">EP ${a.episodes?.length||0}</span>
    </div>
    <div class="ac-info"><div class="ac-title">${a.name}</div></div>
  </a>`).join('')+'</div>';
}

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',function(){
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); curGenre=this.dataset.g; renderGrid(curGenre);
}));

function openSearch(){document.getElementById('srchOv').classList.add('open'); document.getElementById('srchInp').focus();}
function closeSearch(){document.getElementById('srchOv').classList.remove('open');}

function doSearch(q){
  const el = document.getElementById('srchRes');
  if(!q.trim()){ el.innerHTML='<div class="srch-empty">Start typing to search...</div>'; return; }
  const r = animeCache.filter(a => a.name.toLowerCase().includes(q.toLowerCase()) || (a.genre||'').toLowerCase().includes(q.toLowerCase()));
  if(!r.length){ el.innerHTML=`<div class="srch-empty">"${q}" not found</div>`; return; }
  
  el.innerHTML = r.map(a => `
  <a href="anime.html?id=${a.id}" class="srch-item" onclick="closeSearch()">
    <div class="srch-thumb"><img src="${fixPoster(a.poster)}" onerror="this.style.display='none'"></div>
    <div class="srch-info">
      <h4>${a.name}</h4>
      <span>${a.episodes?.length||0} Episodes</span>
    </div>
  </a>`).join('');
}
document.getElementById('srchOv').addEventListener('click', function(e){ if(e.target === this) closeSearch(); });
</script>
</body>
</html>
