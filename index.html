<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWI.TO - Premium Anime Hub</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0c; /* Deep dark background */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- NAVBAR --- */
        .navbar {
            background-color: #16161a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-logo {
            font-size: 24px;
            font-weight: 900;
            color: #00d2ff;
            letter-spacing: 1px;
        }
        .navbar-menu-icon {
            font-size: 24px;
            color: #fff;
            cursor: pointer;
        }

        /* --- HORIZONTAL SWIPE CAROUSEL --- */
        .section-header {
            margin: 20px 15px 5px 15px;
            padding-left: 10px;
            border-left: 4px solid #00d2ff; /* Cyan accent line */
            font-size: 18px;
            font-weight: bold;
        }
        
        .category-slider {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 15px 15px 30px 15px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; 
        }
        .category-slider::-webkit-scrollbar {
            display: none; /* Scrollbar hide karne ke liye */
        }

        /* Card Design */
        .char-card {
            flex: 0 0 auto;
            width: 100px;
            height: 140px;
            position: relative;
            scroll-snap-align: start;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .char-card:hover {
            transform: scale(1.05); /* Hover karne par thoda bada hoga */
        }
        .char-bg {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            height: 85px;
            border-radius: 40px 40px 0 0;
            z-index: 1;
        }
        .char-img {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: auto;
            z-index: 2;
        }
        .char-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background-color: #000;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            border: 1px solid #333;
            z-index: 3;
            text-transform: uppercase;
        }

        /* --- MAIN ANIME SECTION (Solo Leveling Area) --- */
        .anime-container {
            padding: 15px;
        }
        .anime-card {
            background-color: #16161a;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #2a2a35;
        }
        .anime-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .anime-details {
            padding: 15px;
        }
        .anime-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #fff;
        }
        .anime-status {
            display: inline-block;
            background-color: #28a745;
            color: #fff;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        /* Episode Box */
        .episode-box {
            background-color: #202026;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #ff9a76;
        }
        .ep-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }
        .btn-watch {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
        .btn-download {
            background-color: #00d2ff;
            color: #000;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-menu-icon">☰</div>
        <div class="navbar-logo">AWI.TO</div>
        <div class="navbar-menu-icon">🔍</div>
    </nav>

    <div class="section-header">CarToons & Animes 🔥</div>
    <div class="category-slider">
        
        <div class="char-card">
            <div class="char-bg" style="background-color: #ff9a76;"></div>
            <img src="https://i.ibb.co/3RKGtq6/naruto-png.png" alt="Naruto" class="char-img"> 
            <div class="char-label">NARUTO</div>
        </div>

        <div class="char-card">
            <div class="char-bg" style="background-color: #ff4757;"></div>
            <img src="https://i.ibb.co/S3GzXYM/spiderman-png.png" alt="Spiderman" class="char-img">
            <div class="char-label">SPIDERMAN</div>
        </div>

        <div class="char-card">
            <div class="char-bg" style="background-color: #70a1ff;"></div>
            <img src="https://i.ibb.co/Wc6q7wN/pokemon-png.png" alt="Pokemon" class="char-img">
            <div class="char-label">POKEMON</div>
        </div>

        <div class="char-card">
            <div class="char-bg" style="background-color: #ff7f50;"></div>
            <img src="https://i.ibb.co/6PZKzvH/shinchan-png.png" alt="Shinchan" class="char-img">
            <div class="char-label">SHINCHAN</div>
        </div>

        </div>

    <div class="section-header">Latest Uploads 🎬</div>
    
    <div class="anime-container">
        
        <div class="anime-card">
            <img src="https://wallpapers.com/images/hd/solo-leveling-sung-jin-woo-glowing-eyes-0o4o28a506k2w3y8.jpg" alt="Solo Leveling" class="anime-poster">
            
            <div class="anime-details">
                <h2 class="anime-title">Solo Leveling (Hindi Dubbed)</h2>
                <div class="anime-status">Completed</div>

                <div class="episode-box">
                    <div class="ep-title">Episode 01 - "I'm Used to It"</div>
                    <div class="btn-group">
                        <a href="#" class="btn btn-watch">▶ QuickWatch</a>
                        <a href="#" class="btn btn-download">⬇ Download</a>
                    </div>
                </div>
                
                <div class="episode-box">
                    <div class="ep-title">Episode 02 - "If I Had One More Chance"</div>
                    <div class="btn-group">
                        <a href="#" class="btn btn-watch">▶ QuickWatch</a>
                        <a href="#" class="btn btn-download">⬇ Download</a>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
